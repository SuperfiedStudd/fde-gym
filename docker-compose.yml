name: fde-gym

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-claimops}
      POSTGRES_USER: ${POSTGRES_USER:-claimops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claimops-local}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claimops} -d ${POSTGRES_DB:-claimops}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://claimops:${POSTGRES_PASSWORD:-claimops-local}@postgres:5432/${POSTGRES_DB:-claimops}
      REDIS_URL: redis://redis:6379/0
      MISSION_ROOT: /workspace/missions
      PROGRESS_FILE: /workspace/data/progress.json
      EDGE_SERVICE_URL: http://edge-service:3001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./missions:/workspace/missions:ro
      - ./data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://claimops:${POSTGRES_PASSWORD:-claimops-local}@postgres:5432/${POSTGRES_DB:-claimops}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  edge-service:
    build:
      context: .
      dockerfile: apps/edge-service/Dockerfile
    environment:
      PORT: 3001
      API_URL: http://api:8000
      LOG_LEVEL: info
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:

