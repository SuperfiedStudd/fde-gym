name: platform-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r apps/api/requirements-dev.txt
      - run: python -m ruff check apps/api apps/worker scripts tests/platform
      - run: python -m pytest tests/platform
      - run: python scripts/evaluate/list.py

  typescript-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

